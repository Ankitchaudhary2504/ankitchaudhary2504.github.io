<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ankit Chaudhary | App Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#667eea,#764ba2);
padding:20px;
}

/* Card */

.container{
width:100%;
max-width:900px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:20px;
padding:40px;
text-align:center;
color:white;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

/* Profile */

.profile{
width:120px;
height:120px;
border-radius:50%;
background:linear-gradient(135deg,#00f2fe,#4facfe);
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
font-weight:600;
margin:auto;
margin-bottom:20px;
}

/* Title */

h1{
font-size:2.2rem;
margin-bottom:10px;
}

.subtitle{
opacity:0.9;
margin-bottom:30px;
font-size:1rem;
}

/* Apps */

.apps{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.app-card{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:15px;
transition:0.3s;
}

.app-card:hover{
transform:translateY(-6px);
background:rgba(255,255,255,0.25);
}

.app-title{
font-size:1.2rem;
font-weight:600;
margin-bottom:8px;
}

.app-desc{
font-size:0.9rem;
opacity:0.85;
}

/* Footer */

.footer{
margin-top:30px;
font-size:0.85rem;
opacity:0.7;
}

/* Responsive */

@media(max-width:600px){

.container{
padding:25px;
}

h1{
font-size:1.7rem;
}

}

</style>
</head>

<body>

<div class="container">

<div class="profile">AC</div>

<h1>Ankit Chaudhary</h1>
<p class="subtitle">Mobile App Developer</p>

<div class="apps">

<div class="app-card">
<div class="app-title">Kiddo Learn</div>
<div class="app-desc">
Fun educational app designed for kids to learn easily through interactive activities.
</div>
</div>

<div class="app-card">
<div class="app-title">Photo Billing App</div>
<div class="app-desc">
Capture bills instantly using your phone camera and keep all records organized.
</div>
</div>

</div>

<div class="footer">
© 2026 Ankit Chaudhary • All Rights Reserved
</div>

</div>

</body>
</html>
